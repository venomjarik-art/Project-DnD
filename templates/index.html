<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя коллекция карт D&D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        
        .deck-section {
            flex: 1;
            min-width: 300px;
        }
        
        .deck-container {
            position: relative;
            width: 300px;
            height: 420px;
            margin: 0 auto;
        }
        
        .deck-card {
            position: absolute;
            width: 250px;
            height: 350px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        
        .deck-card:nth-child(1) { transform: translate(-50%, -50%) rotate(-6deg); }
        .deck-card:nth-child(2) { transform: translate(-50%, -50%) rotate(-4deg); }
        .deck-card:nth-child(3) { transform: translate(-50%, -50%) rotate(-2deg); }
        .deck-card:nth-child(4) { transform: translate(-50%, -50%) rotate(0deg); }
        
        .deck-card:hover {
            transform: translate(-50%, -60%) rotate(0deg) scale(1.05);
        }
        
        .menu-section {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        .menu-button {
            display: block;
            width: 100%;
            padding: 15px 25px;
            margin-bottom: 15px;
            background: white;
            color: #2a5298;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .menu-button:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .menu-button.primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 1.3em;
        }
        
        .menu-button.primary:hover {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }
        
        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .card-preview {
            padding: 15px 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }
        
        .tg-link {
            padding: 10px 20px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            transition: background 0.3s;
        }
        
        .tg-link:hover {
            background: #0099dd;
        }
        
        .user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        .guest-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="user-info">
        <span class="guest-badge">👤 Гость</span>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>🎮 Моя коллекция карт D&D</h1>
            <p>Управляйте своими персонажами</p>
        </div>
        
        <div class="main-content">
            <div class="deck-section">
                <div class="deck-container">
                    <div class="deck-card" onclick="location.href='/login'">🔒</div>
                    <div class="deck-card" onclick="location.href='/login'">🔒</div>
                    <div class="deck-card" onclick="location.href='/login'">🔒</div>
                    <div class="deck-card" onclick="location.href='/login'">🔒</div>
                </div>
            </div>
            
            <div class="menu-section">
                <a href="/login" class="menu-button primary">
                    🔐 Войти
                </a>
                <a href="/register" class="menu-button">
                    📝 Регистрация
                </a>
            </div>
        </div>
        
        <div class="footer">
            <a href="https://t.me/ProjectDnD_bot" class="tg-link" target="_blank">
                🤖 Ссылка на тг бот
            </a>
        </div>
    </div>
</body>
</html>
